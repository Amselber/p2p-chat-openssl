# test_config.ini
# Тестовый конфигурационный файл для модульных тестов

[network]
multicast_addr = 224.0.0.1
multicast_port = 8000
hello_interval = 10

[security]
ca_cert = /etc/certs/ca.crt
my_cert = /etc/certs/node.crt
my_key = /etc/certs/node.key

[logging]
level = debug
console = no
file = /var/log/chat.log
